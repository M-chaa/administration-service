spring.application.name=administration-service
# Server
server.port=8088

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/administration_service?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# =======================
# Eureka Client (Discovery)
# =======================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Recommandť (affichage plus propre dans Eureka)
eureka.instance.prefer-ip-address=true

server.forward-headers-strategy=framework


